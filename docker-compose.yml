version: '3.8'

services:
  simulation:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - USER_UID=${UID:-1000}
        - USER_GID=${GID:-1000}
        - PX4_VERSION=${PX4_VERSION}
    network_mode: host
    privileged: true
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - LIBGL_ALWAYS_SOFTWARE=1
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${XAUTHORITY:-$HOME/.Xauthority}:/home/devuser/.Xauthority:rw
      - ./drone_landing_ws:/home/devuser/drone_landing_ws:rw
      - ./scripts:/home/devuser/scripts:rw
      - ./tests:/home/devuser/tests:rw
      - ./artifacts:/home/devuser/artifacts:rw
